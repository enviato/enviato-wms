# .github/workflows/rls-tests.yml
#
# Runs the RLS regression suite (tests/rls/*.sql) against a freshly migrated +
# seeded Supabase stack on every PR / push that touches RLS-relevant code.
#
# Why this workflow exists:
#   The Tier 6 audit (2026-04-19) shipped policies (migrations 016-024) that
#   close real cross-tenant + self-escalation holes. tests/rls/ encodes those
#   policies as ROLLBACK-only PostgreSQL scripts. Running them locally before
#   every release is brittle; this workflow makes them gate every PR.
#
# Why it does NOT use `supabase db reset`:
#   Migrations 001-009 reflect the schema as it existed when those files were
#   written, but prod has since drifted (~12 tables / several functions / new
#   enums were created out-of-band via Supabase Studio and never backfilled
#   into a numbered migration). `supabase db reset` replays migrations in
#   filename order and breaks when later migrations reference objects the
#   older migrations don't create.
#
#   Instead we apply a schema snapshot of prod (`supabase/_ci_baseline.sql`,
#   reconstructed via Supabase MCP introspection on 2026-04-21) and then
#   replay only the migrations newer than the snapshot's cutoff version
#   (recorded in `supabase/_ci_baseline.cutoff`). This makes CI a faithful
#   replica of prod's actual schema without requiring us to retroactively
#   rewrite migrations 001-009.
#
#   Regeneration procedure for the baseline lives in tests/rls/README.md.
#
# Trigger scope (intentionally narrow — the suite isn't free to run):
#   - Anything under supabase/migrations/  (schema or policy change)
#   - Anything under tests/rls/             (test change)
#   - This workflow file itself             (CI config drift)
#   - supabase/seed.sql                     (fixtures change)
#   - supabase/_ci_baseline.sql             (snapshot regenerated)
#   - supabase/_ci_baseline.cutoff          (snapshot cutoff bumped)
#   - supabase/config.toml                  (stack config change)

name: RLS Regression Tests

on:
  pull_request:
    paths:
      - "supabase/migrations/**"
      - "supabase/seed.sql"
      - "supabase/_ci_baseline.sql"
      - "supabase/_ci_baseline.cutoff"
      - "supabase/config.toml"
      - "tests/rls/**"
      - ".github/workflows/rls-tests.yml"
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - "supabase/seed.sql"
      - "supabase/_ci_baseline.sql"
      - "supabase/_ci_baseline.cutoff"
      - "supabase/config.toml"
      - "tests/rls/**"
      - ".github/workflows/rls-tests.yml"
  # Allow manual runs from the Actions tab when investigating a regression.
  workflow_dispatch:

# Cancel in-flight runs on the same ref when a new commit lands — saves CI
# minutes on rapid pushes.
concurrency:
  group: rls-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rls-tests:
    name: RLS regression suite
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The Supabase CLI ships everything we need: a Postgres container,
      # migration runner, and seed loader. Omitting `version` tells the
      # action to install the latest CLI release (passing `version: latest`
      # as a literal string is historically flaky — it's gotten resolved
      # to stale fallbacks in the past).
      #
      # config.toml intentionally does NOT set db.major_version, so whatever
      # Postgres the installed CLI defaults to is fine — RLS semantics are
      # identical from PG13+, and prod runs PG17.
      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1

      - name: Cache Supabase Docker images
        uses: actions/cache@v4
        with:
          path: ~/.cache/supabase
          key: supabase-cli-${{ runner.os }}-${{ hashFiles('supabase/config.toml') }}
          restore-keys: |
            supabase-cli-${{ runner.os }}-

      # Stash supabase/migrations/ AND supabase/seed.sql before
      # `supabase start` runs.
      #
      # Modern supabase CLI (v1.100+) auto-applies every file under
      # supabase/migrations/ AND runs supabase/seed.sql as part of
      # `supabase start` init — not only during `db reset`. Since our
      # migration chain doesn't fresh-replay (the whole reason this
      # workflow exists) and seed.sql references tables those migrations
      # would create, the stack dies during init unless both are hidden.
      #
      # Past CI failures we've seen here, in order:
      #   commit 16a22e4: died on `Applying migration 005_agents_hierarchy.sql`
      #     (relation "agents" does not exist) — fixed by stashing migrations.
      #   commit 9c11373: died on `Seeding data from supabase/seed.sql`
      #     (relation "public.role_permissions" does not exist) — same root
      #     cause for seed; fixed by stashing seed.sql too.
      #
      # By moving both aside, `supabase start` finds nothing to apply or
      # seed and boots cleanly. We restore both before the steps that
      # actually need them (post-cutoff replay needs migrations/, the
      # explicit Load seed step needs seed.sql).
      - name: Stash migrations and seed before stack boot
        run: |
          if [ -d supabase/migrations ]; then
            mv supabase/migrations supabase/.migrations-stash
            echo "Stashed supabase/migrations -> supabase/.migrations-stash"
          fi
          if [ -f supabase/seed.sql ]; then
            mv supabase/seed.sql supabase/.seed.sql.stash
            echo "Stashed supabase/seed.sql -> supabase/.seed.sql.stash"
          fi

      # `supabase start` boots the local stack (Postgres + GoTrue + PostgREST
      # + Studio + Inbucket) using supabase/config.toml. We only need
      # Postgres, but the CLI doesn't currently expose a Postgres-only mode,
      # and the boot is fast enough on GHA (~30-45s).
      #
      # We deliberately skip `supabase db reset` here — see header for why.
      # The Supabase stack boots with an empty `public` schema (because we
      # stashed migrations and seed above); we apply the baseline +
      # post-cutoff migrations + seed ourselves below.
      - name: Start Supabase stack
        run: supabase start
        working-directory: ${{ github.workspace }}

      # Restore migrations and seed now that the stack is up.
      - name: Restore migrations and seed
        if: always()
        run: |
          if [ -d supabase/.migrations-stash ]; then
            mv supabase/.migrations-stash supabase/migrations
            echo "Restored supabase/migrations"
          fi
          if [ -f supabase/.seed.sql.stash ]; then
            mv supabase/.seed.sql.stash supabase/seed.sql
            echo "Restored supabase/seed.sql"
          fi

      # Belt-and-suspenders: drop and recreate `public` so we don't care
      # what (if anything) `supabase start` left in there. Some CLI
      # versions seed `public` with their own examples during init; we
      # want a clean slate for the baseline. Schema-level grants are
      # restored to match what Supabase's image normally provides.
      - name: Reset public schema to empty
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -p 54322 -U postgres -d postgres \
            -v ON_ERROR_STOP=1 \
            -c "DROP SCHEMA IF EXISTS public CASCADE;
                CREATE SCHEMA public;
                GRANT ALL ON SCHEMA public TO postgres;
                GRANT USAGE ON SCHEMA public TO anon, authenticated, service_role;
                ALTER DEFAULT PRIVILEGES IN SCHEMA public
                  GRANT ALL ON TABLES TO postgres, anon, authenticated, service_role;
                ALTER DEFAULT PRIVILEGES IN SCHEMA public
                  GRANT ALL ON FUNCTIONS TO postgres, anon, authenticated, service_role;
                ALTER DEFAULT PRIVILEGES IN SCHEMA public
                  GRANT ALL ON SEQUENCES TO postgres, anon, authenticated, service_role;"

      # Apply the prod-equivalent schema snapshot. This is the heavy lift —
      # everything migrations 001-024 (and the out-of-band Studio drift)
      # would have created. After this step the local DB has the same
      # schema, helpers, RLS policies, and grants as prod did at the cutoff
      # version recorded in supabase/_ci_baseline.cutoff.
      - name: Apply schema baseline
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -p 54322 -U postgres -d postgres \
            -v ON_ERROR_STOP=1 \
            -f supabase/_ci_baseline.sql

      # Apply only the migrations newer than the baseline's cutoff. The
      # cutoff file is one line: the numeric version of the highest
      # migration the snapshot already includes. Anything strictly greater
      # than that gets replayed in numeric order.
      #
      # Today (cutoff=024, latest migration=024) this loop matches nothing
      # and exits silently. The first time someone adds a 025_*.sql file,
      # it runs that migration here; the next baseline regeneration will
      # absorb it and bump the cutoff.
      - name: Apply post-cutoff migrations
        env:
          PGPASSWORD: postgres
        run: |
          set -euo pipefail
          cutoff_raw=$(tr -d '[:space:]' < supabase/_ci_baseline.cutoff)
          if ! [[ "$cutoff_raw" =~ ^[0-9]+$ ]]; then
            echo "::error::supabase/_ci_baseline.cutoff is not a plain integer (got: '$cutoff_raw')"
            exit 1
          fi
          # Force base-10 with 10#… so leading zeros don't make bash think
          # we're doing octal (024 would otherwise parse fine, but 008/009
          # would abort the whole job under `set -e`).
          cutoff=$((10#$cutoff_raw))
          echo "Baseline cutoff: $cutoff"
          shopt -s nullglob
          applied=0
          # Glob expansion is already lexicographically sorted — no need
          # for `$(ls ... | sort)`, which is glob-unsafe on whitespace.
          for f in supabase/migrations/*.sql; do
            base=$(basename "$f")
            # Migration filenames are NNN_description.sql — take everything
            # before the first underscore and coerce to base-10.
            ver_raw="${base%%_*}"
            if ! [[ "$ver_raw" =~ ^[0-9]+$ ]]; then
              echo "::warning::Skipping $base (no numeric prefix)"
              continue
            fi
            ver=$((10#$ver_raw))
            if (( ver > cutoff )); then
              echo "Applying post-cutoff migration: $base (version $ver)"
              psql -h localhost -p 54322 -U postgres -d postgres \
                -v ON_ERROR_STOP=1 \
                -f "$f"
              applied=$((applied + 1))
            fi
          done
          echo "Post-cutoff migrations applied: $applied"

      # Load fixtures. seed.sql is shared with `supabase db reset` and is
      # idempotent enough to run after the baseline (uses ON CONFLICT DO
      # NOTHING for static reference data).
      - name: Load seed fixtures
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -p 54322 -U postgres -d postgres \
            -v ON_ERROR_STOP=1 \
            -f supabase/seed.sql

      # Sanity: confirm seed loaded what the suite expects, fail fast with
      # a clear error if the seed regressed before we even start the suite.
      - name: Verify seed fixtures
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -p 54322 -U postgres -d postgres \
            -v ON_ERROR_STOP=1 \
            -c "SELECT
                  (SELECT COUNT(*) FROM public.users WHERE id IN (
                    '4109f9a3-9c51-4096-91de-09223cbd9203',
                    'a0000000-0000-0000-0000-000000000001',
                    'a0000000-0000-0000-0000-000000000007',
                    'a0000000-0000-0000-0000-000000000020',
                    '2e5f8d15-ba91-48d3-bc9d-4a1a55c346d9'
                  )) AS expected_users_5,
                  (SELECT COUNT(*) FROM public.packages
                    WHERE customer_id = 'a0000000-0000-0000-0000-000000000007') AS ana_pkgs_2,
                  (SELECT COUNT(*) FROM public.invoices
                    WHERE customer_id = 'a0000000-0000-0000-0000-000000000007') AS ana_invs_2,
                  (SELECT COUNT(*) FROM public.role_permissions
                    WHERE permission_key = 'invoices:edit'
                      AND role_id = '1885e100-1cb9-4166-94f1-aa640481128b') AS org_admin_invoices_edit_1;" \
            | tee seed-verify.out
          # If any of the expected counts is wrong, fail with a useful diff.
          grep -E "^\s+5 \|\s+2 \|\s+2 \|\s+1\s*$" seed-verify.out \
            || (echo "::error::Seed fixtures don't match expected shape (see counts above)" && exit 1)

      # Run the suite via run_all.sql — that file uses \i to chain each test.
      # ON_ERROR_STOP=1 is critical: every assertion in tests/rls/* uses
      # RAISE EXCEPTION on failure, so without -v ON_ERROR_STOP=1 psql would
      # print the error and continue, masking failures.
      - name: Run RLS regression suite
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -p 54322 -U postgres -d postgres \
            -v ON_ERROR_STOP=1 \
            -f tests/rls/run_all.sql

      # Print the active policy set on success — useful when reviewing PR
      # logs to confirm a policy actually changed (or didn't) the way the
      # author claims.
      - name: Dump active RLS policies (for PR reviewer)
        if: success()
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -p 54322 -U postgres -d postgres \
            -c "SELECT schemaname, tablename, policyname, cmd
                  FROM pg_policies
                 WHERE schemaname = 'public'
                 ORDER BY tablename, policyname;"

      # Always tear down so the runner is reusable on self-hosted infra.
      - name: Stop Supabase stack
        if: always()
        run: supabase stop --no-backup
        working-directory: ${{ github.workspace }}
